# ============================================
# BioArchive - Nginx Yapilandirmasi
# bioarchive.com.tr & api.bioarchive.com.tr
# ============================================

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

# HTTP -> HTTPS Yonlendirme
server {
    listen 80;
    listen [::]:80;
    server_name bioarchive.com.tr www.bioarchive.com.tr api.bioarchive.com.tr;

    # Let's Encrypt dogrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- Frontend (bioarchive.com.tr) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bioarchive.com.tr www.bioarchive.com.tr;

    # SSL Sertifikalari (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/bioarchive.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bioarchive.com.tr/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/bioarchive.com.tr/chain.pem;

    # SSL Guvenlik Ayarlari
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Guvenlik Headerlari
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Root dizin
    root /var/www/bioarchive/frontend;
    index index.html;

    # Gzip sikistirma
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Rate limiting
    limit_req zone=general burst=40 nodelay;

    # Statik dosya cache
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing - tum path'leri index.html'e yonlendir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hassas dosyalari engelle
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/bioarchive-frontend-access.log;
    error_log /var/log/nginx/bioarchive-frontend-error.log;
}

# ---- API Backend (api.bioarchive.com.tr) ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.bioarchive.com.tr;

    # SSL Sertifikalari
    ssl_certificate /etc/letsencrypt/live/bioarchive.com.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bioarchive.com.tr/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/bioarchive.com.tr/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Rate limiting
    limit_req zone=api burst=20 nodelay;

    # Yuklenen dosyalar icin buyuk boyut
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types application/json;

    # API reverse proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Yuklenen dosyalar
    location /uploads/ {
        alias /var/www/bioarchive/vds/api/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/bioarchive-api-access.log;
    error_log /var/log/nginx/bioarchive-api-error.log;
}
